version: "3.8"

services:

  db:
    image: postgres:16
    container_name: f1-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ale123
      POSTGRES_DB: api-f1
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: f1-api
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DEV_DATABASE_URL: postgres://postgres:Ale123@db:5432/api-f1

volumes:
  pgdata:
