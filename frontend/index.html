<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>F1 Pilotos API</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      padding-top: 100px;
      color: #000;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 100px;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 0 20px;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    header img {
      height: 80px;
    }

    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.8rem;
      margin: 0;
      color: #fff;
      text-align: center;
    }

    .tab-content {
      max-width: 1000px;
      margin: 20px auto;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    input, button {
      padding: 8px;
      margin: 5px 0;
      width: 90%;
      font-size: 1rem;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #ff0000;
      color: #fff;
      border: none;
      transition: all 0.3s;
      cursor: pointer;
    }

    button:hover { background: #cc0000; }

    h2 { 
      margin-top: 0; 
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem; 
      color: #ff0000; 
      text-align: center;
    }

    table {
      border-collapse: collapse;
      width: 90%;
      margin-top: 15px;
      border-radius: 5px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      background: #fff;
      color: #000;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    th { background-color: #ff0000; color: white; }
    tr:nth-child(even) { background-color: #f2f2f2; }
    tr:hover { background-color: #ffe5e5; }

    .output {
      width: 100%;
      display: flex;
      justify-content: center;
    }
  </style>
</head>
<body>

<header>
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/F1.svg/1280px-F1.svg.png" alt="F1 Logo">
  <h1>F1 PILOTOS API</h1>
</header>

<div class="tab-content">
  <h2>Pilotos</h2>

  <input type="text" id="piloto-nombre" placeholder="Nombre Completo">
  <input type="text" id="piloto-nacionalidad" placeholder="Nacionalidad">
  <input type="number" id="piloto-numero" placeholder="Número">
  <input type="text" id="piloto-equipos" placeholder="Equipos (separados por coma)">
  <input type="number" id="piloto-victorias" placeholder="Victorias">
  <input type="number" id="piloto-podios" placeholder="Podios">
  <input type="number" id="piloto-campeonatos" placeholder="Campeonatos Ganados">
  <input type="number" id="piloto-debut" placeholder="Año de Debut">
  <input type="number" id="piloto-puntos" placeholder="Puntos Totales">

  <button onclick="postPiloto()">Agregar Piloto</button>

  <input type="number" id="piloto-id-update" placeholder="ID para actualizar/eliminar">
  <button onclick="putPiloto()">Actualizar Piloto</button>
  <button onclick="deletePiloto()">Eliminar Piloto</button>

  <button onclick="getPilotos()">Ver Todos</button>

  <div id="pilotos-output" class="output"></div>
</div>

<script>
const baseURL = 'http://localhost:3300/api';

// Renderizar tabla
function renderTable(outputId, data) {
  if (!data || data.length === 0) {
    document.getElementById(outputId).innerHTML = "<p>No hay datos.</p>";
    return;
  }

  let html = "<table><tr>";
  Object.keys(data[0]).forEach(key => html += `<th>${key}</th>`);
  html += "</tr>";

  data.forEach(row => {
    html += "<tr>";
    Object.keys(row).forEach(key => html += `<td>${row[key]}</td>`);
    html += "</tr>";
  });

  html += "</table>";
  document.getElementById(outputId).innerHTML = html;
}

// GET
async function getPilotos() {
  const res = await fetch(`${baseURL}/pilotos`);
  const data = await res.json().then(d => d.pilotos);
  renderTable('pilotos-output', data);
}

// POST (CORREGIDO)
async function postPiloto() {
  const body = {
    nombre: document.getElementById('piloto-nombre').value,
    nacionalidad: document.getElementById('piloto-nacionalidad').value,
    numero: parseInt(document.getElementById('piloto-numero').value),
    equipos: document.getElementById('piloto-equipos').value,
    victorias: parseInt(document.getElementById('piloto-victorias').value),
    podios: parseInt(document.getElementById('piloto-podios').value),
    campeonatos: parseInt(document.getElementById('piloto-campeonatos').value),
    debut: parseInt(document.getElementById('piloto-debut').value),
    puntos: parseInt(document.getElementById('piloto-puntos').value)
  };

  await fetch(`${baseURL}/pilotos`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  getPilotos();
}

// PUT
async function putPiloto() {
  const id = document.getElementById('piloto-id-update').value;

  const body = {
    nombre: document.getElementById('piloto-nombre').value,
    nacionalidad: document.getElementById('piloto-nacionalidad').value,
    numero: parseInt(document.getElementById('piloto-numero').value),
    equipos: document.getElementById('piloto-equipos').value,
    victorias: parseInt(document.getElementById('piloto-victorias').value),
    podios: parseInt(document.getElementById('piloto-podios').value),
    campeonatos: parseInt(document.getElementById('piloto-campeonatos').value),
    debut: parseInt(document.getElementById('piloto-debut').value),
    puntos: parseInt(document.getElementById('piloto-puntos').value)
  };

  await fetch(`${baseURL}/pilotos/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  getPilotos();
}

// DELETE
async function deletePiloto() {
  const id = document.getElementById('piloto-id-update').value;

  await fetch(`${baseURL}/pilotos/${id}`, {
    method: 'DELETE'
  });

  getPilotos();
}
</script>

</body>
</html>
