<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Pilotos API</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<link rel="stylesheet" href="./css/styles.css">
<body>

<header>
  <div class="header-content">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/33/F1.svg/1280px-F1.svg.png" alt="F1 Logo" class="logo">
    <h1>F1 Pilotos API</h1>
  </div>
</header>

<div class="container">
  
  <!-- FORM SECTION -->
  <div class="form-section">
    <h2 class="section-title">Gestionar Piloto</h2>
    
    <div class="form-grid">
      <div class="form-group">
        <label>Nombre Completo</label>
        <input type="text" id="piloto-nombre" placeholder="Ej: Lewis Hamilton">
      </div>
      <div class="form-group">
        <label>Nacionalidad</label>
        <input type="text" id="piloto-nacionalidad" placeholder="Ej: British">
      </div>
      <div class="form-group">
        <label>Número</label>
        <input type="number" id="piloto-numero" placeholder="Ej: 44">
      </div>
      <div class="form-group">
        <label>Equipos</label>
        <input type="text" id="piloto-equipos" placeholder="Ej: McLaren, Mercedes">
      </div>
      <div class="form-group">
        <label>Victorias</label>
        <input type="number" id="piloto-victorias" placeholder="Ej: 103">
      </div>
      <div class="form-group">
        <label>Podios</label>
        <input type="number" id="piloto-podios" placeholder="Ej: 194">
      </div>
      <div class="form-group">
        <label>Campeonatos Ganados</label>
        <input type="number" id="piloto-campeonatos" placeholder="Ej: 7">
      </div>
      <div class="form-group">
        <label>Año de Debut</label>
        <input type="date" id="piloto-debut" placeholder="Ej: ">
      </div>
      <div class="form-group">
        <label>Puntos Totales</label>
        <input type="number" id="piloto-puntos" placeholder="Ej: 4845">
      </div>
      <div class="form-group">
        <label>Imagen del Piloto</label>
        <input type="file" id="piloto-imagen">
<button type="button" onclick="clearImage()" class="btn-secondary btn-action">
  Quitar imagen
</button>
      </div>
    </div>

    <div class="button-group">
      <button class="btn-primary" onclick="postPiloto()">Agregar Piloto</button>
      <button class="btn-secondary" onclick="clearForm()">Limpiar Formulario</button>
    </div>
  </div>

  <!-- CONTROL SECTION -->
  <div class="control-section">
    <div class="control-input">
      <label>ID para Actualizar/Eliminar</label>
      <input type="number" id="piloto-id-update" placeholder="Ingresa el ID">
    </div>
    <button class="btn-primary btn-action" onclick="putPiloto()">Actualizar</button>
    <button class="btn-danger btn-action" onclick="deletePiloto()">Eliminar</button>
    <button class="btn-secondary btn-action" onclick="getPilotos()">Cargar Todos</button>
  </div>

  <!-- TABLE SECTION -->
  <div class="table-section">
    <div class="table-header">
      <h3>Pilotos Registrados</h3>
    </div>
    <div id="pilotos-output"></div>
  </div>

</div>


y con el js: <script>
const baseURL = 'http://localhost:8080/api';



function renderTable(outputId, data) {
  if (!data || data.length === 0) {
    document.getElementById(outputId).innerHTML = '<div class="empty-state"><h4>No hay pilotos registrados</h4><p>Agrega uno nuevo para empezar</p></div>';
    return;
  }

  const keys = Object.keys(data[0]);
  let html = '<div class="table-wrapper"><table><thead><tr>';

  keys.forEach(key => {
    html += `<th>${key.charAt(0).toUpperCase() + key.slice(1)}</th>`;
  });

  html += '<th>Acciones</th></tr></thead><tbody>';

  data.forEach(row => {
    html += '<tr>';

    keys.forEach(key => {
      let value = row[key];
      
if (value && typeof value === "string") {


  if (value.includes("T")) {
    const [datePart] = value.split("T");
    const [year, month, day] = datePart.split("-");

    value = `${day}/${month}/${year}`;
  }

 
  else if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
    const [year, month, day] = value;
    value = `${day}/${month}/${year}`;
  }
}
  

      if (key === "imagen") {
        html += value
          ? `<td><img src="${value}" alt="Piloto"></td>`
          : `<td><span style="color: var(--text-secondary);">—</span></td>`;
      } else {
        html += `<td>${value ?? '—'}</td>`;
      }
    });

    html += `
      <td>
        <div class="action-buttons">
          <button class="btn-primary btn-action" onclick="loadToForm(${row.id})">Editar</button>
          <button class="btn-danger btn-action" onclick="deleteById(${row.id})">Eliminar</button>
        </div>
      </td>
    `;

    html += '</tr>';
  });

  html += '</tbody></table></div>';
  document.getElementById(outputId).innerHTML = html;
}

async function getPilotos() {
  try {
    const res = await fetch(`${baseURL}/pilotos`);
    const data = await res.json().then(d => d.pilotos);
    data.sort((a, b) => a.id - b.id);
    renderTable('pilotos-output', data);
  } catch (error) {
    console.error('Error:', error);
    document.getElementById('pilotos-output').innerHTML = '<div class="empty-state"><h4>Error al cargar pilotos</h4></div>';
  }
}

async function postPiloto() {
  const formData = new FormData();

  formData.append('nombre', document.getElementById('piloto-nombre').value);
  formData.append('nacionalidad', document.getElementById('piloto-nacionalidad').value);
  formData.append('numeros', document.getElementById('piloto-numero').value);
  formData.append('equipos', document.getElementById('piloto-equipos').value);
  formData.append('victorias', document.getElementById('piloto-victorias').value);
  formData.append('podios', document.getElementById('piloto-podios').value);
  formData.append('campeonatos', document.getElementById('piloto-campeonatos').value);
  formData.append('debut', document.getElementById('piloto-debut').value);
  formData.append('puntos_totales', document.getElementById('piloto-puntos').value);

  const file = document.getElementById('piloto-imagen').files[0];
  if (file) {
    formData.append('imagen', file);
  }

  try {
    await fetch(`${baseURL}/pilotos`, {
      method: 'POST',
      body: formData
    });
    clearForm();
    getPilotos();
  } catch (error) {
    console.error('Error:', error);
  }
}

async function putPiloto() {
  const id = document.getElementById('piloto-id-update').value;

  if (!id) {
    alert('Ingresa un ID para actualizar');
    return;
  }

  const formData = new FormData();

  formData.append('nombre', document.getElementById('piloto-nombre').value);
  formData.append('nacionalidad', document.getElementById('piloto-nacionalidad').value);
  formData.append('numeros', document.getElementById('piloto-numero').value);
  formData.append('equipos', document.getElementById('piloto-equipos').value);
  formData.append('victorias', document.getElementById('piloto-victorias').value);
  formData.append('podios', document.getElementById('piloto-podios').value);
  formData.append('campeonatos', document.getElementById('piloto-campeonatos').value);
  formData.append('debut', document.getElementById('piloto-debut').value);
  formData.append('puntos_totales', document.getElementById('piloto-puntos').value);

  const file = document.getElementById('piloto-imagen').files[0];
  if (file) {
    formData.append('imagen', file);
  }

  try {
    await fetch(`${baseURL}/pilotos/${id}`, {
      method: 'PUT',
      body: formData
    });
    clearForm();
    getPilotos();
  } catch (error) {
    console.error('Error:', error);
  }
}

async function deletePiloto() {
  const id = document.getElementById('piloto-id-update').value;

  if (!id) {
    alert('Ingresa un ID para eliminar');
    return;
  }

  if (!confirm('¿Estás seguro de que deseas eliminar este piloto?')) {
    return;
  }

  try {
    await fetch(`${baseURL}/pilotos/${id}`, {
      method: 'DELETE'
    });
    clearForm();
    getPilotos();
  } catch (error) {
    console.error('Error:', error);
  }
}

async function deleteById(id) {
  if (!confirm('¿Estás seguro de que deseas eliminar este piloto?')) {
    return;
  }

  try {
    await fetch(`${baseURL}/pilotos/${id}`, {
      method: 'DELETE'
    });
    getPilotos();
  } catch (error) {
    console.error('Error:', error);
  }
}

function loadToForm(id) {
  window.scrollTo({ top: 0, behavior: 'smooth' });
  fetch(`${baseURL}/pilotos/${id}`)
    .then(res => res.json())
    .then(data => {
      const p = data.piloto;

      document.getElementById('piloto-id-update').value = p.id;
      document.getElementById('piloto-nombre').value = p.nombre;
      document.getElementById('piloto-nacionalidad').value = p.nacionalidad;
      document.getElementById('piloto-numero').value = p.numeros;
      document.getElementById('piloto-equipos').value = p.equipos;
      document.getElementById('piloto-victorias').value = p.victorias;
      document.getElementById('piloto-podios').value = p.podios;
      document.getElementById('piloto-campeonatos').value = p.campeonatos;
      document.getElementById('piloto-debut').value = p.debut;
      document.getElementById('piloto-puntos').value = p.puntos_totales;
    });
}

function clearForm() {
  document.getElementById('piloto-nombre').value = '';
  document.getElementById('piloto-nacionalidad').value = '';
  document.getElementById('piloto-numero').value = '';
  document.getElementById('piloto-equipos').value = '';
  document.getElementById('piloto-victorias').value = '';
  document.getElementById('piloto-podios').value = '';
  document.getElementById('piloto-campeonatos').value = '';
  document.getElementById('piloto-debut').value = '';
  document.getElementById('piloto-puntos').value = '';
  document.getElementById('piloto-imagen').value = '';
  document.getElementById('piloto-id-update').value = '';
}

function clearImage() {
  document.getElementById('piloto-imagen').value = '';
}

</script>
</body>
</html>
