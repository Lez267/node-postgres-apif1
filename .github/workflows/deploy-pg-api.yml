name: deploy-pg-api

on:
  push:
    branches: ["main"]

jobs:
  deploy-pg-api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: echo 'hello world ...'
      - run: ls -la

      - run: touch .env
      - run: echo 'DATABASE_URL=${{ secrets.PG_CONN }}' >> .env
      - run: cat .env

      - run: docker build -t ${{ secrets.DOCKER_USER }}/RESTAPI-F1-PG:${{ github.sha }} .
      - run: docker images

      - name: docker login
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin

      - name: docker push
        run: docker push ${{ secrets.DOCKER_USER }}/RESTAPI-F1-PG:${{ github.sha }}
